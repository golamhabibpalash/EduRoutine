services:
  postgres:
    image: postgres:16-alpine
    container_name: eduroutine-postgres
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eduroutine
      POSTGRES_USER: eduroutine
      POSTGRES_PASSWORD: eduroutine_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduroutine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eduroutine-redis
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eduroutine-pgadmin
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eduroutine.com
      PGADMIN_DEFAULT_PASSWORD: admin_dev
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
