openapi: 3.1.0

info:
  title: EduRoutine API
  version: "1.0.0"
  summary: Academic timetable & routine management platform API.
  description: |
    Complete API contract for EduRoutine. Generated from approved Phase 3 (Database Design),
    Phase 5 (API Design), Phase 6 (Authentication) and Phase 7 (Authorization).

    All standards (envelope, versioning, validation, errors, pagination, filtering, sorting,
    security) are defined in `00-api-standards.md`. This document is the normative machine-readable
    contract. Per-field DTO validation is catalogued in `dto-catalog.md`; error codes in
    `error-response-catalog.md`.

    - Success responses use the standard envelope: `{ status, data, meta }`.
    - Error responses use: `{ status, error }`.
    - Authentication: Bearer JWT (RS256) by default; `X-API-Key` for M2M.
  contact:
    name: EduRoutine API Team
    url: https://docs.eduroutine.com
    email: api@eduroutine.com
  license:
    name: Proprietary
  x-api-lifecycle: stable

servers:
  - url: https://api.eduroutine.com/api/v1
    description: Production
  - url: https://staging-api.eduroutine.com/api/v1
    description: Staging
  - url: http://localhost:8000/api/v1
    description: Local

tags:
  - name: Authentication
    description: Login, registration, token lifecycle, OAuth2 social login.
  - name: Users
    description: User accounts, profile, role & claim assignment.
  - name: Roles
    description: Roles and role-permission mappings (RBAC).
  - name: Claims
    description: User claim-based authorization entries.
  - name: Sessions
    description: Academic sessions (years).
  - name: Batches
    description: Student batches within a session/department.
  - name: Semesters
    description: Semesters within a session.
  - name: Sections
    description: Sections within a batch.
  - name: Courses
    description: Course catalog and prerequisites.
  - name: Students
    description: Student records, enrollment, schedules.
  - name: Teachers
    description: Teacher records, workload, availability, specializations.
  - name: Rooms
    description: Physical rooms (all types).
  - name: Labs
    description: Laboratory rooms (specialization of Rooms, room_type=lab).
  - name: Periods
    description: Period definitions (projection over time slots).
  - name: TimeSlots
    description: Concrete time-bounded slots.
  - name: Classes
    description: Scheduled class meetings (read projection over routine details).
  - name: Routines
    description: Timetables and their lifecycle.
  - name: RoutineDetails
    description: Individual schedule entries within a routine.

security:
  - bearerAuth: []

paths:

  # ============================================================ AUTHENTICATION
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: User registered; verification email sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokenEnvelope' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokenEnvelope' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Rotate tokens using a refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshTokenRequest' }
      responses:
        '200':
          description: New token pair issued (refresh rotated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokenEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke the current refresh token and blacklist access token
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshTokenRequest' }
      responses:
        '204': { description: Logged out. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request a password reset email
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
      responses:
        '202': { description: If the account exists, a reset email was sent. }
        '400': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password using a reset token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '204': { description: Password reset; all sessions invalidated. }
        '400': { $ref: '#/components/responses/ValidationError' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /auth/oauth/{provider}:
    get:
      tags: [Authentication]
      summary: Initiate OAuth2 authorization-code (PKCE) flow
      operationId: oauthInitiate
      security: []
      parameters:
        - { $ref: '#/components/parameters/OAuthProvider' }
        - name: redirect_uri
          in: query
          required: true
          schema: { type: string, format: uri }
        - name: state
          in: query
          required: true
          schema: { type: string, minLength: 16 }
        - name: code_challenge
          in: query
          required: false
          schema: { type: string }
      responses:
        '302': { description: Redirect to provider authorization URL. }

  /auth/oauth/{provider}/callback:
    get:
      tags: [Authentication]
      summary: OAuth2 provider callback (code exchange)
      operationId: oauthCallback
      security: []
      parameters:
        - { $ref: '#/components/parameters/OAuthProvider' }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '302': { description: Redirect to frontend with token fragment. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ============================================================ USERS
  /users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      x-required-permission: user:read:*
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { $ref: '#/components/parameters/Sort' }
        - { $ref: '#/components/parameters/Expand' }
        - { $ref: '#/components/parameters/Search' }
        - name: is_active
          in: query
          schema: { type: boolean }
        - name: role
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated users.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Users]
      summary: Create a user
      operationId: createUser
      x-required-permission: user:create:*
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses:
        '201':
          description: Created.
          headers: { Location: { $ref: '#/components/headers/Location' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /users/me:
    get:
      tags: [Users]
      summary: Get current authenticated user
      operationId: getCurrentUser
      x-required-permission: user:read:own
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Users]
      summary: Update own profile
      operationId: updateCurrentUser
      x-required-permission: user:update:own
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/me/password:
    put:
      tags: [Users]
      summary: Change own password
      operationId: changePassword
      x-required-permission: user:update:own
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '204': { description: Password changed; other sessions invalidated. }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /users/{id}:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Users]
      summary: Get a user
      operationId: getUser
      x-required-permission: user:read:*
      parameters: [ { $ref: '#/components/parameters/Expand' } ]
      responses:
        '200':
          description: User.
          headers: { ETag: { $ref: '#/components/headers/ETag' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Users]
      summary: Replace a user
      operationId: replaceUser
      x-required-permission: user:update:*
      parameters: [ { $ref: '#/components/parameters/IfMatch' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReplaceUserRequest' }
      responses:
        '200':
          description: Replaced.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
    patch:
      tags: [Users]
      summary: Partially update a user
      operationId: patchUser
      x-required-permission: user:update:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Users]
      summary: Deactivate a user (soft delete)
      operationId: deactivateUser
      x-required-permission: user:delete:*
      responses:
        '204': { description: Deactivated. }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}/roles:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Users]
      summary: Get a user's roles
      operationId: getUserRoles
      x-required-permission: user:read:*
      responses:
        '200':
          description: Roles.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleListEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Users]
      summary: Replace a user's role assignments
      operationId: setUserRoles
      x-required-permission: role:assign:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetUserRolesRequest' }
      responses:
        '200':
          description: Roles updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleListEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /users/{id}/claims:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Claims]
      summary: List a user's claims
      operationId: getUserClaims
      x-required-permission: user:read:*
      responses:
        '200':
          description: Claims.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClaimListEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Claims]
      summary: Add a claim to a user
      operationId: addUserClaim
      x-required-permission: user:update:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateClaimRequest' }
      responses:
        '201':
          description: Claim added.
          headers: { Location: { $ref: '#/components/headers/Location' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClaimEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /users/{id}/claims/{claimId}:
    parameters:
      - { $ref: '#/components/parameters/ResourceId' }
      - { $ref: '#/components/parameters/ClaimId' }
    delete:
      tags: [Claims]
      summary: Remove a claim from a user
      operationId: deleteUserClaim
      x-required-permission: user:update:*
      responses:
        '204': { description: Claim removed. }
        '404': { $ref: '#/components/responses/NotFound' }

  # ============================================================ ROLES
  /roles:
    get:
      tags: [Roles]
      summary: List roles
      operationId: listRoles
      x-required-permission: role:read:*
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { $ref: '#/components/parameters/Sort' }
        - { $ref: '#/components/parameters/Search' }
      responses:
        '200':
          description: Roles.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleListEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Roles]
      summary: Create a role
      operationId: createRole
      x-required-permission: role:create:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRoleRequest' }
      responses:
        '201':
          description: Created.
          headers: { Location: { $ref: '#/components/headers/Location' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleEnvelope' }
        '409': { $ref: '#/components/responses/Conflict' }

  /roles/{id}:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Roles]
      summary: Get a role
      operationId: getRole
      x-required-permission: role:read:*
      responses:
        '200':
          description: Role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Roles]
      summary: Update a role
      operationId: updateRole
      x-required-permission: role:update:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateRoleRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Roles]
      summary: Delete a role
      operationId: deleteRole
      x-required-permission: role:delete:*
      responses:
        '204': { description: Deleted. }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /roles/{id}/permissions:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Roles]
      summary: Get a role's permissions
      operationId: getRolePermissions
      x-required-permission: role:read:*
      responses:
        '200':
          description: Permissions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PermissionListEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Roles]
      summary: Replace a role's permissions
      operationId: setRolePermissions
      x-required-permission: role:update:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetRolePermissionsRequest' }
      responses:
        '200':
          description: Permissions updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PermissionListEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /permissions:
    get:
      tags: [Roles]
      summary: List all permissions (catalog)
      operationId: listPermissions
      x-required-permission: role:read:*
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - name: module
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Permissions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PermissionListEnvelope' }

  # ============================================================ SESSIONS
  /sessions:
    get:
      tags: [Sessions]
      summary: List academic sessions
      operationId: listSessions
      x-required-permission: session:read:*
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { $ref: '#/components/parameters/Sort' }
        - name: is_current
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Sessions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionListEnvelope' }
    post:
      tags: [Sessions]
      summary: Create a session
      operationId: createSession
      x-required-permission: session:create:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSessionRequest' }
      responses:
        '201':
          description: Created.
          headers: { Location: { $ref: '#/components/headers/Location' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionEnvelope' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /sessions/{id}:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Sessions]
      summary: Get a session
      operationId: getSession
      x-required-permission: session:read:*
      responses:
        '200':
          description: Session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Sessions]
      summary: Update a session
      operationId: updateSession
      x-required-permission: session:update:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSessionRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    delete:
      tags: [Sessions]
      summary: Delete a session
      operationId: deleteSession
      x-required-permission: session:delete:*
      responses:
        '204': { description: Deleted. }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /sessions/{id}/activate:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    patch:
      tags: [Sessions]
      summary: Set a session as the current session
      operationId: activateSession
      x-required-permission: session:update:*
      responses:
        '200':
          description: Session activated (others deactivated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ============================================================ BATCHES
  /batches:
    get:
      tags: [Batches]
      summary: List batches
      operationId: listBatches
      x-required-permission: batch:read:*
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { $ref: '#/components/parameters/Sort' }
        - { $ref: '#/components/parameters/Expand' }
        - name: session_id
          in: query
          schema: { type: string, format: uuid }
        - name: department_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Batches.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchListEnvelope' }
    post:
      tags: [Batches]
      summary: Create a batch
      operationId: createBatch
      x-required-permission: batch:create:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBatchRequest' }
      responses:
        '201':
          description: Created.
          headers: { Location: { $ref: '#/components/headers/Location' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchEnvelope' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }

  /batches/{id}:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Batches]
      summary: Get a batch
      operationId: getBatch
      x-required-permission: batch:read:*
      parameters: [ { $ref: '#/components/parameters/Expand' } ]
      responses:
        '200':
          description: Batch.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Batches]
      summary: Update a batch
      operationId: updateBatch
      x-required-permission: batch:update:*
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBatchRequest' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Batches]
      summary: Delete a batch
      operationId: deleteBatch
      x-required-permission: batch:delete:*
      responses:
        '204': { description: Deleted. }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /batches/{id}/sections:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
    get:
      tags: [Batches]
      summary: List sections in a batch
      operationId: listBatchSections
      x-required-permission: section:read:*
      responses:
        '200':
          description: Sections.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SectionListEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  /batches/{id}/routines:
    parameters: [ { $ref: '#/components/parameters/ResourceId' } ]
