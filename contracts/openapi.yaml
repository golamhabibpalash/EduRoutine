# ================================================================ COMPONENTS
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 JWT access token (15-min lifetime). Verified via JWKS.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Machine-to-machine public API key.

  headers:
    Location:
      description: URI of the created resource.
      schema: { type: string, format: uri }
    ETag:
      description: Concurrency token for optimistic locking.
      schema: { type: string }
    RetryAfter:
      description: Seconds to wait before retrying.
      schema: { type: integer }

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource UUID.
      schema: { type: string, format: uuid }
    RoutineId:
      name: routineId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ClaimId:
      name: claimId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema: { type: string, enum: [google, microsoft, facebook] }
    Page:
      name: page
      in: query
      description: 1-based page number.
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      description: Items per page (max 100).
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Sort:
      name: sort
      in: query
      description: 'CSV of sort fields; prefix "-" for descending. e.g. -created_at,code'
      schema: { type: string }
    Expand:
      name: expand
      in: query
      description: CSV of related resources to embed (max depth 2).
      schema: { type: string }
    Search:
      name: q
      in: query
      description: Full-text search across searchable fields.
      schema: { type: string }
    IfMatch:
      name: If-Match
      in: header
      description: ETag for optimistic concurrency control.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: Client key to de-duplicate retried create/bulk requests (24h window).
      schema: { type: string, format: uuid }

  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example:
            status: error
            error:
              code: VALIDATION_ERROR
              message: Request validation failed.
              details:
                fields:
                  - { field: email, code: PATTERN_MISMATCH, message: Invalid email. }
              request_id: 0f9c2a14-3b6e-4c2a-9f3a-1a2b3c4d5e6f
              timestamp: "2026-06-18T10:00:00Z"
    Unauthorized:
      description: Missing or invalid credentials.
      headers:
        WWW-Authenticate:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Authenticated but lacking permission.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Resource conflict (duplicate, referenced, or invalid state).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ScheduleConflict:
      description: Timetable clash (teacher/room/section double-booking).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example:
            status: error
            error:
              code: SCHEDULE_CONFLICT
              message: Teacher is already booked for this time slot.
              details:
                conflict_type: teacher
                conflicting_detail_id: 8b1c...-...
                day_of_week: 0
                period_number: 3
              request_id: 0f9c2a14-...
              timestamp: "2026-06-18T10:00:00Z"
    Unprocessable:
      description: Semantic/business-rule validation failure.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    PreconditionFailed:
      description: If-Match ETag did not match.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ServiceUnavailable:
      description: Temporary outage.
      headers:
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:

    # ---------- Envelope primitives ----------
    Meta:
      type: object
      required: [request_id, timestamp, version]
      properties:
        request_id: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        version: { type: string, example: "1.0" }
        pagination: { $ref: '#/components/schemas/Pagination' }
    Pagination:
      type: object
      properties:
        page: { type: integer }
        page_size: { type: integer }
        total_items: { type: [integer, "null"] }
        total_pages: { type: [integer, "null"] }
        has_next: { type: boolean }
        has_previous: { type: boolean }
        next_cursor: { type: [string, "null"] }
    ErrorEnvelope:
      type: object
      required: [status, error]
      properties:
        status: { type: string, const: error }
        error:
          type: object
          required: [code, message, request_id, timestamp]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
            request_id: { type: string, format: uuid }
            timestamp: { type: string, format: date-time }
            documentation_url: { type: string, format: uri }
    FieldError:
      type: object
      properties:
        field: { type: string }
        code: { type: string }
        message: { type: string }
        rejected_value: {}

    # ---------- Enums ----------
    DayOfWeek:
      type: integer
      minimum: 0
      maximum: 6
      description: 0=Mon, 1=Tue, 2=Wed, 3=Thu, 4=Fri, 5=Sat, 6=Sun.
    RoomType:
      type: string
      enum: [lecture, lab, seminar, office]
    StudentStatus:
      type: string
      enum: [active, inactive, graduated, suspended, withdrawn]
    RoutineStatus:
      type: string
      enum: [draft, published, archived]
    ConstraintType:
      type: string
      enum: [hard, soft]

    # ---------- Auth ----------
    RegisterRequest:
      type: object
      required: [email, password, display_name]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 255 }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
        display_name: { type: string, minLength: 2, maxLength: 200 }
        phone: { type: [string, "null"], maxLength: 30 }
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        device_info: { type: [string, "null"], maxLength: 500 }
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      additionalProperties: false
      properties:
        refresh_token: { type: string }
    ForgotPasswordRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email: { type: string, format: email }
    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      additionalProperties: false
      properties:
        token: { type: string }
        new_password: { type: string, format: password, minLength: 12, maxLength: 128 }
    AuthTokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: Bearer }
        expires_in: { type: integer, example: 900 }
    AuthTokenEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/AuthTokens' }

    SuccessEnvelope:
      type: object
      required: [status, data, meta]
      properties:
        status: { type: string, const: success }
        data: {}
        meta: { $ref: '#/components/schemas/Meta' }

    # ---------- Users ----------
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        email_verified: { type: boolean }
        display_name: { type: string }
        phone: { type: [string, "null"] }
        is_active: { type: boolean }
        roles:
          type: array
          items: { type: string }
        last_login_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateUserRequest:
      type: object
      required: [email, password, display_name]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 255 }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
        display_name: { type: string, minLength: 2, maxLength: 200 }
        phone: { type: [string, "null"], maxLength: 30 }
        is_active: { type: boolean, default: true }
        role_ids:
          type: array
          items: { type: string, format: uuid }
    ReplaceUserRequest:
      type: object
      required: [display_name, is_active]
      additionalProperties: false
      properties:
        display_name: { type: string, minLength: 2, maxLength: 200 }
        phone: { type: [string, "null"], maxLength: 30 }
        is_active: { type: boolean }
    UpdateUserRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string, minLength: 2, maxLength: 200 }
        phone: { type: [string, "null"], maxLength: 30 }
        is_active: { type: boolean }
    UpdateProfileRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string, minLength: 2, maxLength: 200 }
        phone: { type: [string, "null"], maxLength: 30 }
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      additionalProperties: false
      properties:
        current_password: { type: string, format: password }
        new_password: { type: string, format: password, minLength: 12, maxLength: 128 }
    SetUserRolesRequest:
      type: object
      required: [role_ids]
      additionalProperties: false
      properties:
        role_ids:
          type: array
          items: { type: string, format: uuid }
          uniqueItems: true
    UserEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/UserResponse' } }
    UserListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/UserResponse' }

    # ---------- Roles & Permissions ----------
    RoleResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, "null"] }
        is_system_role: { type: boolean }
        permission_count: { type: integer }
        created_at: { type: string, format: date-time }
    CreateRoleRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 2, maxLength: 100, pattern: '^[a-z][a-z0-9_]*$' }
        description: { type: [string, "null"], maxLength: 500 }
        permission_ids:
          type: array
          items: { type: string, format: uuid }
    UpdateRoleRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 2, maxLength: 100, pattern: '^[a-z][a-z0-9_]*$' }
        description: { type: [string, "null"], maxLength: 500 }
    SetRolePermissionsRequest:
      type: object
      required: [permission_ids]
      additionalProperties: false
      properties:
        permission_ids:
          type: array
          items: { type: string, format: uuid }
          uniqueItems: true
    PermissionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: 'routine:publish:*' }
        name: { type: string }
        module: { type: string }
        description: { type: [string, "null"] }
    RoleEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/RoleResponse' } }
    RoleListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/RoleResponse' } }
    PermissionListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/PermissionResponse' } }

    # ---------- Claims ----------
    ClaimResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        claim_type: { type: string }
        claim_value: { type: string }
    CreateClaimRequest:
      type: object
      required: [claim_type, claim_value]
      additionalProperties: false
      properties:
        claim_type: { type: string, minLength: 1, maxLength: 200 }
        claim_value: { type: string, minLength: 1, maxLength: 500 }
    ClaimEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/ClaimResponse' } }
    ClaimListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/ClaimResponse' } }

    # ---------- Sessions ----------
    SessionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        is_current: { type: boolean }
        created_at: { type: string, format: date-time }
    CreateSessionRequest:
      type: object
      required: [name, start_date, end_date]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 4, maxLength: 100, example: "2025-2026" }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        is_current: { type: boolean, default: false }
    UpdateSessionRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 4, maxLength: 100 }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
    SessionEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/SessionResponse' } }
    SessionListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/SessionResponse' } }

    # ---------- Batches ----------
    BatchResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        session_id: { type: string, format: uuid }
        department_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
    CreateBatchRequest:
      type: object
      required: [name, code, session_id, department_id]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }
        code: { type: string, minLength: 2, maxLength: 50 }
        session_id: { type: string, format: uuid }
        department_id: { type: string, format: uuid }
    UpdateBatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }
        code: { type: string, minLength: 2, maxLength: 50 }
    BatchEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/BatchResponse' } }
    BatchListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/BatchResponse' } }

    # ---------- Semesters ----------
    SemesterResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        number: { type: integer }
        session_id: { type: string, format: uuid }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        created_at: { type: string, format: date-time }
    CreateSemesterRequest:
      type: object
      required: [name, number, session_id, start_date, end_date]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }
        number: { type: integer, minimum: 1, maximum: 12 }
        session_id: { type: string, format: uuid }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
    UpdateSemesterRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }
        number: { type: integer, minimum: 1, maximum: 12 }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
    SemesterEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/SemesterResponse' } }
    SemesterListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/SemesterResponse' } }

    # ---------- Sections ----------
    SectionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        batch_id: { type: string, format: uuid }
        max_capacity: { type: integer }
        student_count: { type: integer }
        created_at: { type: string, format: date-time }
    CreateSectionRequest:
      type: object
      required: [name, batch_id, max_capacity]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 50 }
        batch_id: { type: string, format: uuid }
        max_capacity: { type: integer, minimum: 1, maximum: 500 }
    UpdateSectionRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 50 }
        max_capacity: { type: integer, minimum: 1, maximum: 500 }
    AssignStudentsRequest:
      type: object
      required: [student_ids]
      additionalProperties: false
      properties:
        student_ids:
          type: array
          items: { type: string, format: uuid }
          uniqueItems: true
    SectionEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/SectionResponse' } }
    SectionListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/SectionResponse' } }

    # ---------- Courses ----------
    CourseResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
        credits: { type: number }
        lecture_hours: { type: integer }
        lab_hours: { type: integer }
        department_id: { type: string, format: uuid }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    CreateCourseRequest:
      type: object
      required: [code, title, credits, lecture_hours, department_id]
      additionalProperties: false
      properties:
        code: { type: string, pattern: '^[A-Z]{2,4}-\d{3}$', example: 'CSE-101' }
        title: { type: string, minLength: 3, maxLength: 200 }
        credits: { type: number, minimum: 0.5, maximum: 6.0, multipleOf: 0.5 }
        lecture_hours: { type: integer, minimum: 0, maximum: 20 }
        lab_hours: { type: integer, minimum: 0, maximum: 20, default: 0 }
        department_id: { type: string, format: uuid }
        prerequisite_ids:
          type: array
          items: { type: string, format: uuid }
    UpdateCourseRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title: { type: string, minLength: 3, maxLength: 200 }
        credits: { type: number, minimum: 0.5, maximum: 6.0, multipleOf: 0.5 }
        lecture_hours: { type: integer, minimum: 0, maximum: 20 }
        lab_hours: { type: integer, minimum: 0, maximum: 20 }
        is_active: { type: boolean }
    AddPrerequisiteRequest:
      type: object
      required: [prerequisite_id]
      additionalProperties: false
      properties:
        prerequisite_id: { type: string, format: uuid }
    CourseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/CourseResponse' } }
    CourseListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/CourseResponse' } }

    # ---------- Students ----------
    StudentResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        roll_number: { type: string }
        registration_number: { type: [string, "null"] }
        batch_id: { type: string, format: uuid }
        section_id: { type: [string, "null"], format: uuid }
        enrollment_date: { type: string, format: date }
        status: { $ref: '#/components/schemas/StudentStatus' }
    CreateStudentRequest:
      type: object
      required: [user_id, roll_number, batch_id]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        roll_number: { type: string, minLength: 1, maxLength: 50 }
        registration_number: { type: [string, "null"], maxLength: 50 }
        batch_id: { type: string, format: uuid }
        section_id: { type: [string, "null"], format: uuid }
        enrollment_date: { type: string, format: date }
    UpdateStudentRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        roll_number: { type: string, minLength: 1, maxLength: 50 }
        registration_number: { type: [string, "null"], maxLength: 50 }
        section_id: { type: [string, "null"], format: uuid }
        status: { $ref: '#/components/schemas/StudentStatus' }
    BulkStudentRequest:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 1000
          items: { $ref: '#/components/schemas/CreateStudentRequest' }
    EnrollStudentRequest:
      type: object
      required: [course_ids]
      additionalProperties: false
      properties:
        course_ids:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
          uniqueItems: true
    StudentEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/StudentResponse' } }
    StudentListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/StudentResponse' } }

    # ---------- Teachers ----------
    TeacherResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        employee_code: { type: string }
        designation: { type: string }
        department_id: { type: string, format: uuid }
        max_hours_per_week: { type: integer }
        specialization:
          type: array
          items: { type: string }
    CreateTeacherRequest:
      type: object
      required: [user_id, employee_code, designation, department_id]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        employee_code: { type: string, minLength: 1, maxLength: 50 }
        designation: { type: string, minLength: 2, maxLength: 100 }
        department_id: { type: string, format: uuid }
        max_hours_per_week: { type: integer, minimum: 1, maximum: 60, default: 30 }
        specialization:
          type: array
          items: { type: string, maxLength: 100 }
    UpdateTeacherRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        designation: { type: string, minLength: 2, maxLength: 100 }
        max_hours_per_week: { type: integer, minimum: 1, maximum: 60 }
        specialization:
          type: array
          items: { type: string, maxLength: 100 }
    SetAvailabilityRequest:
      type: object
      required: [slots]
      additionalProperties: false
      properties:
        slots:
          type: array
          items:
            type: object
            required: [day_of_week, time_slot_id, available]
            additionalProperties: false
            properties:
              day_of_week: { $ref: '#/components/schemas/DayOfWeek' }
              time_slot_id: { type: string, format: uuid }
              available: { type: boolean }
    AddSpecializationRequest:
      type: object
      required: [course_id]
      additionalProperties: false
      properties:
        course_id: { type: string, format: uuid }
        preference_level: { type: integer, minimum: 0, maximum: 10, default: 0 }
    SpecializationResponse:
      type: object
      properties:
        course_id: { type: string, format: uuid }
        preference_level: { type: integer }
    WorkloadResponse:
      type: object
      properties:
        teacher_id: { type: string, format: uuid }
        max_hours_per_week: { type: integer }
        assigned_hours_per_week: { type: integer }
        utilization_percent: { type: number }
        courses_count: { type: integer }
    TeacherEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/TeacherResponse' } }
    TeacherListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/TeacherResponse' } }
    SpecializationListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/SpecializationResponse' } }
    WorkloadEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/WorkloadResponse' } }

    # ---------- Rooms / Labs ----------
    RoomResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        building: { type: string }
        floor: { type: integer }
        capacity: { type: integer }
        room_type: { $ref: '#/components/schemas/RoomType' }
        has_projector: { type: boolean }
        has_computers: { type: boolean }
        has_ac: { type: boolean }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    CreateRoomRequest:
      type: object
      required: [name, code, building, floor, capacity, room_type]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        code: { type: string, minLength: 1, maxLength: 50 }
        building: { type: string, minLength: 1, maxLength: 100 }
        floor: { type: integer, minimum: -5, maximum: 200 }
        capacity: { type: integer, minimum: 1, maximum: 1000 }
        room_type: { $ref: '#/components/schemas/RoomType' }
        has_projector: { type: boolean, default: false }
        has_computers: { type: boolean, default: false }
        has_ac: { type: boolean, default: true }
    CreateLabRequest:
      type: object
      required: [name, code, building, floor, capacity]
      additionalProperties: false
      description: room_type is forced to 'lab'.
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        code: { type: string, minLength: 1, maxLength: 50 }
        building: { type: string, minLength: 1, maxLength: 100 }
        floor: { type: integer, minimum: -5, maximum: 200 }
        capacity: { type: integer, minimum: 1, maximum: 1000 }
        has_projector: { type: boolean, default: false }
        has_computers: { type: boolean, default: true }
        has_ac: { type: boolean, default: true }
    UpdateRoomRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        building: { type: string, minLength: 1, maxLength: 100 }
        floor: { type: integer, minimum: -5, maximum: 200 }
        capacity: { type: integer, minimum: 1, maximum: 1000 }
        has_projector: { type: boolean }
        has_computers: { type: boolean }
        has_ac: { type: boolean }
        is_active: { type: boolean }
    RoomEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/RoomResponse' } }
    RoomListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/RoomResponse' } }

    # ---------- Periods / TimeSlots ----------
    PeriodResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        period_number: { type: integer }
        session_id: { type: [string, "null"], format: uuid }
    CreatePeriodRequest:
      type: object
      required: [name, period_number]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        period_number: { type: integer, minimum: 1, maximum: 30 }
        session_id: { type: [string, "null"], format: uuid }
    TimeSlotResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        period_number: { type: integer }
        start_time: { type: string, example: "09:00" }
        end_time: { type: string, example: "09:50" }
        duration_minutes: { type: integer }
        is_break: { type: boolean }
        is_lab_slot: { type: boolean }
        session_id: { type: [string, "null"], format: uuid }
    CreateTimeSlotRequest:
      type: object
      required: [name, period_number, start_time, end_time, duration_minutes]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        period_number: { type: integer, minimum: 1, maximum: 30 }
        start_time: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
        end_time: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
        duration_minutes: { type: integer, minimum: 5, maximum: 480 }
        is_break: { type: boolean, default: false }
        is_lab_slot: { type: boolean, default: false }
        session_id: { type: [string, "null"], format: uuid }
    UpdateTimeSlotRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        start_time: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
        end_time: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
        duration_minutes: { type: integer, minimum: 5, maximum: 480 }
        is_break: { type: boolean }
        is_lab_slot: { type: boolean }
    PeriodEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/PeriodResponse' } }
    PeriodListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/PeriodResponse' } }
    TimeSlotEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/TimeSlotResponse' } }
    TimeSlotListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/TimeSlotResponse' } }

    # ---------- Routines ----------
    RoutineResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: [string, "null"] }
        session_id: { type: string, format: uuid }
        batch_id: { type: string, format: uuid }
        semester_id: { type: [string, "null"], format: uuid }
        status: { $ref: '#/components/schemas/RoutineStatus' }
        valid_from: { type: string, format: date }
        valid_to: { type: string, format: date }
        created_by: { type: [string, "null"], format: uuid }
        details:
          type: array
          description: Present only when ?expand=details.
          items: { $ref: '#/components/schemas/RoutineDetailResponse' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateRoutineRequest:
      type: object
      required: [title, session_id, batch_id, valid_from, valid_to]
      additionalProperties: false
      properties:
        title: { type: string, minLength: 2, maxLength: 200 }
        description: { type: [string, "null"], maxLength: 2000 }
        session_id: { type: string, format: uuid }
        batch_id: { type: string, format: uuid }
        semester_id: { type: [string, "null"], format: uuid }
        valid_from: { type: string, format: date }
        valid_to: { type: string, format: date }
    UpdateRoutineRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title: { type: string, minLength: 2, maxLength: 200 }
        description: { type: [string, "null"], maxLength: 2000 }
        semester_id: { type: [string, "null"], format: uuid }
        valid_from: { type: string, format: date }
        valid_to: { type: string, format: date }
    CloneRoutineRequest:
      type: object
      required: [target_session_id]
      additionalProperties: false
      properties:
        target_session_id: { type: string, format: uuid }
        target_semester_id: { type: [string, "null"], format: uuid }
        target_batch_id: { type: [string, "null"], format: uuid }
        new_title: { type: [string, "null"], maxLength: 200 }
    RoutineEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/RoutineResponse' } }
    RoutineListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/RoutineResponse' } }

    # ---------- Routine Details ----------
    RoutineDetailResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        routine_id: { type: string, format: uuid }
        day_of_week: { $ref: '#/components/schemas/DayOfWeek' }
        time_slot_id: { type: string, format: uuid }
        period_number: { type: integer }
        course_id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        room_id: { type: string, format: uuid }
        section_id: { type: [string, "null"], format: uuid }
        is_lab: { type: boolean }
        group_name: { type: [string, "null"] }
    CreateRoutineDetailRequest:
      type: object
      required: [day_of_week, time_slot_id, period_number, course_id, teacher_id, room_id]
      additionalProperties: false
      properties:
        day_of_week: { $ref: '#/components/schemas/DayOfWeek' }
        time_slot_id: { type: string, format: uuid }
        period_number: { type: integer, minimum: 1, maximum: 30 }
        course_id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        room_id: { type: string, format: uuid }
        section_id: { type: [string, "null"], format: uuid }
        is_lab: { type: boolean, default: false }
        group_name: { type: [string, "null"], maxLength: 50 }
    UpdateRoutineDetailRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        day_of_week: { $ref: '#/components/schemas/DayOfWeek' }
        time_slot_id: { type: string, format: uuid }
        period_number: { type: integer, minimum: 1, maximum: 30 }
        course_id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        room_id: { type: string, format: uuid }
        section_id: { type: [string, "null"], format: uuid }
        is_lab: { type: boolean }
        group_name: { type: [string, "null"], maxLength: 50 }
    BulkRoutineDetailRequest:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 1000
          items: { $ref: '#/components/schemas/CreateRoutineDetailRequest' }
    RoutineDetailEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/RoutineDetailResponse' } }
    RoutineDetailListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/RoutineDetailResponse' } }

    # ---------- Classes (projection) ----------
    ClassResponse:
      type: object
      description: A single scheduled class meeting derived from a routine detail.
      properties:
        id: { type: string, format: uuid, description: routine_detail id }
        routine_id: { type: string, format: uuid }
        day_of_week: { $ref: '#/components/schemas/DayOfWeek' }
        period_number: { type: integer }
        start_time: { type: string }
        end_time: { type: string }
        course: { $ref: '#/components/schemas/CourseRef' }
        teacher: { $ref: '#/components/schemas/EntityRef' }
        room: { $ref: '#/components/schemas/EntityRef' }
        section: { $ref: '#/components/schemas/EntityRef' }
        is_lab: { type: boolean }
    CourseRef:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
    EntityRef:
      type: object
      properties:
        id: { type: [string, "null"], format: uuid }
        name: { type: [string, "null"] }
    ClassEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/ClassResponse' } }
    ClassListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { type: array, items: { $ref: '#/components/schemas/ClassResponse' } }

    # ---------- Shared projections ----------
    ScheduleResponse:
      type: object
      properties:
        owner_type: { type: string, enum: [student, teacher] }
        owner_id: { type: string, format: uuid }
        session_id: { type: [string, "null"], format: uuid }
        classes:
          type: array
          items: { $ref: '#/components/schemas/ClassResponse' }
    AvailabilityResponse:
      type: object
      properties:
        resource_type: { type: string, enum: [room, teacher] }
        resource_id: { type: string, format: uuid }
        slots:
          type: array
          items:
            type: object
            properties:
              day_of_week: { $ref: '#/components/schemas/DayOfWeek' }
              time_slot_id: { type: string, format: uuid }
              available: { type: boolean }
    UtilizationResponse:
      type: object
      properties:
        resource_id: { type: string, format: uuid }
        total_slots: { type: integer }
        used_slots: { type: integer }
        utilization_percent: { type: number }
    ConflictReportResponse:
      type: object
      properties:
        routine_id: { type: string, format: uuid }
        conflict_count: { type: integer }
        conflicts:
          type: array
          items:
            type: object
            properties:
              conflict_type: { type: string, enum: [teacher, room, section] }
              day_of_week: { $ref: '#/components/schemas/DayOfWeek' }
              period_number: { type: integer }
              detail_ids:
                type: array
                items: { type: string, format: uuid }
    BulkItemResult:
      type: object
      properties:
        index: { type: integer }
        status: { type: string, enum: [created, updated, skipped, failed] }
        id: { type: [string, "null"], format: uuid }
        error: { $ref: '#/components/schemas/FieldError' }
    BulkResult:
      type: object
      properties:
        total: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/BulkItemResult' }
    ScheduleEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/ScheduleResponse' } }
    AvailabilityEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/AvailabilityResponse' } }
    UtilizationEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/UtilizationResponse' } }
    ConflictReportEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/ConflictReportResponse' } }
    BulkResultEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties: { data: { $ref: '#/components/schemas/BulkResult' } }
